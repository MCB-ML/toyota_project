services:
  postgres:
    image: postgres:16-alpine
    container_name: toyota-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-dashboard}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dashboard}
      POSTGRES_DB: ${PG_DATABASE:-toyota_dashboard}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - dashboard_pg_data:/var/lib/postgresql/data
      - ./server/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-dashboard} -d ${PG_DATABASE:-toyota_dashboard}"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    container_name: toyota-dashboard-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - dashboard_chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dashboard_pg_data:
  dashboard_chroma_data:
