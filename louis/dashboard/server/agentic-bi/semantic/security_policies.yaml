# Security Policies — 사용자 권한 범위 필터
# 이번 워크북에는 "로그인 사용자 = 자기 딜러만 조회" 같은 행 단위 보안 규칙의 증거가
# 없다(대시보드가 관리자/본사 화면으로 보임 — 슬라이서로 딜러를 "선택"하지, 강제되지 않음).
# 따라서 아래는 confirmed 1건 + unresolved로 명확히 나눈다. 없는 것을 있다고 가정하지 않는다.

confirmed_policies:
  - policy_id: sc_scope_default
    description: "모든 SC 관련 조회에 강제 적용되는 조직 스코프 (filters.yaml sc_scope_default 참고)"
    enforced_by: [br_exclude_front_sc, br_exclude_staff_names, br_exclude_test_users, br_dealer_scope]
    bypass_condition: none
    source_evidence: [sql_metadata.json]

unresolved_policies:
  - policy_id: row_level_dealer_access
    description: "로그인 사용자가 자신의 딜러/조직 범위 밖 데이터를 조회할 수 있는지 여부"
    status: unresolved
    reason: "워크북의 GOLD 쿼리는 전부 슬라이서 파라미터(선택적 필터)로만 딜러/전시장/부서를 다루며, 세션 사용자 신원에 따른 강제 범위 제한 로직이 원문에 없음"
    required_input: ["대시보드 로그인/권한 체계 정의서", "role-to-dealer 매핑 테이블 존재 여부"]

  - policy_id: pii_column_policy
    description: "고객 개인정보(이름/연락처 등) 컬럼 노출 범위"
    status: unresolved
    reason: "FCT_MNG_CUST_LIST 등 고객 관련 팩트의 컬럼 정의서 미확보로 PII 컬럼 목록 자체를 특정할 수 없음"
    required_input: ["FCT_MNG_CUST_LIST 컬럼 정의서", "개인정보 처리방침 상 마스킹 대상 컬럼 목록"]

sql_safety_note: >
  P8(app/semantic/validator.js + app/agents/nodes/10_sqlSafetyValidator.js)의 SQL Safety Validator는
  confirmed_policies를 무조건 주입하고, unresolved_policies가 해소되기 전까지는
  "로그인 사용자 범위 제한 없음"을 명시적으로 가정한 채 동작해야 한다 — 조용히 전체
  데이터를 열어주는 기본값을 두는 대신, 없는 정책을 있다고 속이지 않는 쪽을 택한다.
