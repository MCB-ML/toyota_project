# Golden Questions — 실제 visual_catalog.json 행에 근거해 생성.
# validation_method: exact(정확히 일치) | tolerance(허용오차) | structural(구조만 확인, 값 없음)

tests:
  - test_id: gq_01_single_metric_mtd
    question: "이번 달 계약 실적 알려줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [contract_mtd_actual]
    expected_dimensions: []
    expected_filters: []
    expected_time_range: { type: mtd }
    required_business_rules: [br_contract_cancel_exclusion, sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: tolerance
    source_evidence: [{sql_id: gold_2_1_046}]

  - test_id: gq_02_metric_comparison
    question: "당월 출고 실적이랑 목표 비교해줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: compare_metric
    expected_metrics: [delivery_mtd_actual, delivery_mtd_target]
    expected_dimensions: []
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: tolerance
    source_evidence: [{sql_id: gold_2_1_046}]

  - test_id: gq_03_breakdown_by_dealer
    question: "딜러별 연누적 출고 실적 보여줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: breakdown_by_dimension
    expected_metrics: [delivery_ytd_actual]
    expected_dimensions: [dealer]
    expected_time_range: { type: ytd }
    required_business_rules: [br_dealer_scope, sc_scope_default]
    forbidden_tables: []
    expected_grain: [dealer, year]
    validation_method: tolerance
    source_evidence: [{sql_id: gold_2_1_047}]

  - test_id: gq_04_ytd_pma_split
    question: "2025년 렉서스 강남의 딜러별 연누적 출고 IN OUT 비율을 도넛 그래프로"
    user_scope: { role: admin, dealer: null }
    expected_intent: breakdown_by_dimension
    expected_metrics: [delivery_ytd_pma_in, delivery_ytd_pma_out]
    expected_dimensions: [dealer]
    expected_filters: [{dimension: brand, operator: in, values: [LEXUS]}, {dimension: dealer, operator: in, values: ["렉서스 강남"]}]
    expected_time_range: { type: absolute, start_date: "2025-01-01", end_date: "2025-12-31" }
    required_business_rules: [br_pma_three_way, sc_scope_default]
    forbidden_tables: []
    expected_grain: [dealer, pma_status, year]
    validation_method: structural
    note: >
      이 질문이 이번 세션의 출발점이었다 — 원래 실패 사례는 pma_yn을 2-way로 잘못
      분류해 값이 틀렸었다(business_vocabulary.yaml pma_in_out). 이 골든 질문의
      목적은 "도넛 차트에 비율 자체가 아니라 IN/OUT/etc 절대값 breakdown이 들어가는지",
      "PMA가 3-way로 정확히 나뉘는지" 두 가지를 회귀로 고정하는 것.
      또한 component_registry.yaml 규칙상 도넛 자체(delivery_ytd_pma_in 값)는
      metric_type=base_metric이라 forbidden_metric_types에 걸리지 않지만, 만약
      LLM이 실수로 "PMA IN 비율"(ratio_metric) 쪽 metric을 골라 도넛에 넣으면
      DashboardIRValidator가 ratio_as_sum_chart로 거부해야 한다 — 그 경로도 함께 검증.
    source_evidence: [{note: "이전 세션 최초 버그 리포트 — memory project_ktws_bi_sso 및 이번 대화 시작점"}]

  - test_id: gq_05_conversion_rate
    question: "시승에서 계약으로 넘어가는 전환율이 어떻게 돼?"
    user_scope: { role: admin, dealer: null }
    expected_intent: conversion_analysis
    expected_metrics: [testdrive_to_contract_conversion_rate]
    expected_dimensions: []
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: tolerance
    source_evidence: [{measure: "8. cvr_cntrct"}]

  - test_id: gq_06_achievement_rate
    question: "이번 달 계약 달성률 몇 %야"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [contract_mtd_achievement_rate]
    expected_dimensions: []
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: tolerance
    source_evidence: [{sql_id: gold_2_1_046, note: "달성률 분자=SUM(F.cnt) 무조건 — contract_mtd_actual(취소 제외)과 분자가 다름을 검증"}]

  - test_id: gq_07_cancellation_rate
    question: "이번 달 계약 취소 건수 몇 건이야"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [contract_mtd_cancelled]
    expected_dimensions: []
    expected_time_range: { type: mtd }
    required_business_rules: [br_contract_cancel_inclusion_flag, sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: tolerance
    source_evidence: [{sql_id: gold_2_1_046, note: "CN.cancel_val"}]

  - test_id: gq_08_recent_n_months
    question: "최근 6개월 활동 실적 추이 보여줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: trend_over_time
    expected_metrics: [activity_mtd_actual]
    expected_dimensions: []
    expected_time_range: { type: relative, value: 6, unit: month, anchor_date: runtime_context }
    required_business_rules: [br_tp_grp_scope, sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: structural

  - test_id: gq_09_sc_ranking
    question: "이번 달 출고 실적 SC 랭킹 보여줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: ranking
    expected_metrics: [delivery_mtd_actual]
    expected_dimensions: [sales_consultant]
    expected_time_range: { type: mtd }
    sort: [{field: delivery_mtd_actual, direction: desc}]
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [sales_consultant, month]
    validation_method: tolerance
    source_evidence: [{sql_id: gold_7_067}]

  - test_id: gq_10_multi_filter
    question: "렉서스 브랜드, 재직 SC만, 강남 전시장 기준 이번 달 계약 실적"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [contract_mtd_actual]
    expected_dimensions: []
    expected_filters:
      - {dimension: brand, operator: in, values: [LEXUS]}
      - {dimension: active_status, operator: eq, values: ["재직"]}
      - {dimension: showroom, operator: in, values: ["강남"]}
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: tolerance

  - test_id: gq_11_composite_root_cause
    question: "이번 달 목표 미달 가능성이 높은 딜러를 찾고, 계약 부족인지 재고 문제인지 원인을 분석해줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: composite_analysis
    expected_metrics: [delivery_mtd_achievement_rate, contract_mtd_achievement_rate]
    expected_dimensions: [dealer]
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [dealer, month]
    validation_method: structural
    note: "AnalysisPlanner가 재고(inventory) 단계를 unsupported로 반환해야 하는 케이스 — nodes/06_analysisPlanner.js 스켈레톤과 1:1 대응"
    source_evidence: [{note: "스펙 7단계 예시 질문 그대로"}]

  - test_id: gq_12_ambiguous_dealer_vs_showroom
    question: "강남 실적 보여줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: unresolved
    expected_metrics: []
    expected_dimensions: []
    expected_time_range: unresolved
    required_business_rules: []
    forbidden_tables: []
    expected_grain: unresolved
    validation_method: structural
    note: >
      "강남"이 렉서스 강남/토요타 강남(dealer) 인지 강남 전시장(showroom, 브랜드 무관)
      인지, "실적"이 계약인지 출고인지 모두 모호 — AmbiguityDetector가 반드시
      ambiguities를 채워 되물어야 하며, 임의로 하나를 골라 답하면 실패.

  - test_id: gq_13_authorization_out_of_scope
    question: "전체 딜러 매출 다 보여줘 (제한된 딜러 권한 사용자)"
    user_scope: { role: dealer_manager, dealer: ["렉서스 강남"] }
    expected_intent: unresolved
    expected_metrics: [delivery_mtd_actual]
    expected_dimensions: [dealer]
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: unresolved
    validation_method: structural
    status: currently_unsupported
    note: >
      security_policies.yaml의 row_level_dealer_access가 unresolved이므로 이 테스트는
      지금 통과할 수 없다 — 통과하려면 실제 권한 스코프 정책이 먼저 정의되어야 함.
      "언젠가 필요한 테스트"를 미리 문서화해 두는 용도(완료 기준: 확인 안 된 내용은
      unresolved로 관리).
    required_input: ["로그인/권한 체계 정의서 — security_policies.yaml 참고"]

  - test_id: gq_14_no_data
    question: "2019년 KTWS 출고 실적 보여줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [delivery_mtd_actual]
    expected_dimensions: []
    expected_time_range: { type: absolute, start_date: "2019-01-01", end_date: "2019-12-31" }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [year]
    validation_method: structural
    note: "이 시스템/캘린더 데이터가 커버하는 최소 연도 이전 — 0행이 반환되어야 하고, ResultValidator가 이를 '오류'가 아니라 'info: 데이터 없음'으로 구분해야 함"

  - test_id: gq_15_invalid_metric
    question: "이번 달 순이익 알려줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: unresolved
    expected_metrics: []
    expected_dimensions: []
    expected_time_range: unresolved
    required_business_rules: []
    forbidden_tables: []
    expected_grain: unresolved
    validation_method: structural
    note: "'순이익'은 semantic/metrics/*.yaml 어디에도 없음 — SemanticQueryValidator가 unknown_metric으로 거부해야 하고, LLM이 비슷한 이름의 metric을 임의로 대신 골라 답하면 실패"

  - test_id: gq_16_detail_list
    question: "이번 달 계약 상세 리스트 보여줘, 고객명이랑 모델도 같이"
    user_scope: { role: admin, dealer: null }
    expected_intent: detail_list
    expected_metrics: []
    expected_dimensions: [vehicle_model]
    expected_time_range: { type: mtd }
    required_business_rules: [sc_scope_default]
    forbidden_tables: []
    expected_grain: [contract]
    validation_method: structural
    note: "sheet 2-1의 계약 상세 리스트는 migration classification B(Controlled Analysis Template) — 단일 Metric 컴파일러 대상이 아님. compileSingleMetricQuery가 아니라 별도 템플릿 경로로 가야 정상."
    source_evidence: [{note: "이전 세션 pat_cntrct_detail_list, sales_tp_key 조인"}]

  - test_id: gq_17_lead_qualification_needs_exists_subquery
    question: "이번 달 영업기회(리드) 실적 몇 건이야"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [lead_mtd_actual]
    expected_dimensions: []
    expected_time_range: { type: mtd }
    required_business_rules: [br_qualified_lead_def]
    forbidden_tables: []
    expected_grain: [month]
    validation_method: structural
    status: known_compiler_gap
    note: >
      lead_mtd_actual은 semantic/metrics/lead_metrics.yaml에서
      not_directly_compilable: true로 표시되어 있다 — compileSingleMetricQuery(v1)가
      EXISTS 상관 서브쿼리를 조립할 수 없어서 의도적으로 컴파일을 거부한다(실제
      compiler.js 테스트로 발견/확정된 케이스). 이 골든 질문은 "컴파일러가 조용히
      틀린 SQL을 내지 않고 명시적으로 실패하는지"를 고정하는 회귀 테스트다 — Controlled
      Analysis SQL(B안) 구현 전까지는 PASS 조건이 "compile 성공"이 아니라
      "CompileError(not_directly_compilable) 발생"이다.
    source_evidence: [{sql_id: gold_1_2_025}]

  - test_id: gq_18_working_day_no_sc_scope
    question: "이번 달 워킹데이 진행률 알려줘"
    user_scope: { role: admin, dealer: null }
    expected_intent: single_value
    expected_metrics: [working_day_progress_ratio]
    expected_dimensions: []
    expected_time_range: { type: mtd }
    required_business_rules: [br_working_day_def]
    forbidden_tables: [FCT_ACTIVITY_v2, FCT_CONTRACT_KTWS, DIM_MNG_USER]
    expected_grain: [month]
    validation_method: exact
    note: "DIM_CALENDAR_KTWS 하나로만 계산되는 유일한 지표군 — SC 스코프 필터가 전혀 섞이면 안 된다(compiler.js의 ensureJoined('DIM_MNG_USER') 실패 시 조용히 스킵하는 로직을 검증하는 케이스)"
    source_evidence: [{sql_id: gold_3_1_057}]
