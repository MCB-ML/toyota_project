    reason: "FCT_MNG_CUST_LIST 컬럼 정의서 없음 — 조인키 확인 불가"
    required_input: ["FCT_MNG_CUST_LIST 컬럼 정의서"]
  - candidate: "HotBoardMeeting ↔ SalesConsultant/Dealer"
    reason: "FCT_HBOARD_MEETING 컬럼 정의서 없음"
    required_input: ["FCT_HBOARD_MEETING 컬럼 정의서"]
  - candidate: "SCGroupRule ↔ SalesConsultant"
    reason: "FCT_SC_GROUP_RULE 컬럼 정의서 없음 — 그룹 매핑 규칙으로 추정만 가능"
    required_input: ["FCT_SC_GROUP_RULE 컬럼 정의서"]
  - candidate: "NPSRecord ↔ Customer/Contract"
    reason: "FCT_NPS 컬럼 정의서 없음"
    required_input: ["FCT_NPS 컬럼 정의서"]
