# Target / Working-day / Misc Management Metrics
# 근거: sheet 3-1/3-2(워킹데이), sheet 4(목표 관리), sheet 6(핫보드), sheet 2-2(NPS)

metrics:
  - id: working_day_progress_ratio
    name_ko: 워킹데이 진행률
    description: "해당 월 전체 워킹데이 수 대비, 오늘까지 지난 워킹데이 수의 비율. 유일하게 팩트 테이블 없이 캘린더 차원만으로 계산되는 지표"
    metric_type: ratio_metric
    numerator_metric: working_day_count_pass
    denominator_metric: working_day_count_total
    expression: "safe_divide(numerator, denominator, zero_denominator=0.0)"
    zero_denominator_result: 0.0
    format: percentage
    grain: [month]
    dependencies: [working_day_count_pass, working_day_count_total]
    source_evidence: [{sql_id: gold_3_1_057}]
    confidence: high

  - id: working_day_count_pass
    name_ko: 경과 워킹데이 수
    metric_type: base_metric
    fact_entity: WorkingDay
    base_table: DIM_CALENDAR_KTWS
    expression: "COUNT(*)"
    metric_filter: "DIM_CALENDAR_KTWS.[Date] <= CAST(GETDATE() AS DATE)"  # kr_holiday 조건은 required_filters의 br_working_day_def가 이미 담당
    aggregation: count
    grain: [month]
    required_filters: [br_working_day_def]
    dependencies: []
    source_evidence: [{sql_id: gold_3_1_057}]
    confidence: high

  - id: working_day_count_total
    name_ko: 해당 월 전체 워킹데이 수
    metric_type: base_metric
    fact_entity: WorkingDay
    base_table: DIM_CALENDAR_KTWS
    expression: "COUNT(*)"
    metric_filter: null  # kr_holiday='0' 조건은 required_filters의 br_working_day_def가 이미 담당 (working_day_count_pass와 동일 원칙, 실행 테스트로 중복 발견)
    aggregation: count
    grain: [month]
    required_filters: [br_working_day_def]
    dependencies: []
    source_evidence: [{sql_id: gold_3_1_057}]
    confidence: high

  - id: nps_avg_3m
    name_ko: NPS 3개월 평균
    metric_type: snapshot_metric
    fact_entity: NPSRecord
    base_table: FCT_NPS
    expression: unresolved
    aggregation: avg
    grain: [dealer, month]
    dependencies: []
    source_evidence: [{sql_id: gold_2_2_049}]
    confidence: low
    status: unresolved
    required_input: ["FCT_NPS 컬럼 정의서 — 응답 점수 컬럼, 집계 기준"]

  - id: hot_board_meeting_count
    name_ko: 핫보드 회의 관련 지표
    metric_type: base_metric
    fact_entity: HotBoardMeeting
    base_table: FCT_HBOARD_MEETING
    expression: unresolved
    grain: unresolved
    dependencies: []
    source_evidence: [{sql_id: gold_6_066}]
    confidence: low
    status: unresolved
    required_input: ["FCT_HBOARD_MEETING 컬럼 정의서"]
